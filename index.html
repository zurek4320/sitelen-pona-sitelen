<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Toki Pona Renderer (ilo sitelen)</title>

<style>
    body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #ece9e6, #ffffff);
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
    }

    p.subtitle {
        text-align: center;
        color: #666;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    textarea {
        width: 100%;
        height: 150px;
        font-size: 16px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: vertical;
    }

    textarea:focus {
        outline: none;
        border-color: #4CAF50;
    }

    .controls {
        margin-top: 10px;
    }

    button {
        margin: 5px 5px 10px 0;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #45a049;
        transform: translateY(-1px);
    }

    input[type="file"] {
        margin-top: 5px;
    }

    /* рҹ‘Ү Load your nasin nanpa font */
    @font-face {
        font-family: "nasin-nanpa";
        src: url("nasin-nanpa.otf");
    }

    .label {
        font-weight: bold;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    #preview {
    font-family: "nasin-nanpa", sans-serif;
    border: 2px dashed #ffb300;
    padding: 20px;
    min-height: 120px;
    background: #fff8e1;
    font-size: 24px;
    border-radius: 10px;

    /* NEW: preserve newlines */
    white-space: pre-wrap;
    }
</style>
</head>

<body>
<div class="container">

    <h1>Toki Pona Renderer</h1>
    <p class="subtitle">ilo sitelen pi toki pona</p>

    <div class="label">
        Input (toki insa)
    </div>
    <textarea id="inputText" placeholder="Type Toki Pona here... / o sitelen e toki pona lon ni..."></textarea>

    <div class="controls">
        <button onclick="renderText()">Render / o pana e sitelen</button>
        <button onclick="exportText()">Export .txt / o pana e lipu .txt</button>
        <br>
        <input type="file" id="fileInput" accept=".txt">
        <span>Load file / o kama jo e lipu</span>
    </div>

    <div class="label">
        Preview (lukin)
    </div>
    <div id="preview"></div>

</div>

<script>
const input = document.getElementById("inputText");
const preview = document.getElementById("preview");
const fileInput = document.getElementById("fileInput");

const tpDict = {
"a":"уұӨҖ","aa":"уұӨҖуұӨҖ","aaa":"уұӨҖуұӨҖуұӨҖ",
"akesi":"уұӨҒ","ala":"уұӨӮ","alasa":"уұӨғ","ale":"уұӨ„","ali":"уұӨ„",
"anpa":"уұӨ…","ante":"уұӨҶ","anu":"уұӨҮ","apeja":"уұҰЎ","awen":"уұӨҲ",
"e":"уұӨү","en":"уұӨҠ","epiku":"уұҰғ","esun":"уұӨӢ",
"ijo":"уұӨҢ","ike":"уұӨҚ","ilo":"уұӨҺ","insa":"уұӨҸ",
"jaki":"уұӨҗ","jan":"уұӨ‘","jasima":"уұҘҝ","jelo":"уұӨ’","jo":"уұӨ“",
"kala":"уұӨ”","kalama":"уұӨ•","kama":"уұӨ–","kasi":"уұӨ—",
"ken":"уұӨҳ","kepeken":"уұӨҷ","kepen":"уұӨҷ",
"kije":"уұҰҖ","kijete":"уұҰҖ","kijetesantakalu":"уұҰҖ",
"kili":"уұӨҡ","kin":"уұҘ№","kipisi":"уұҘ»","kiwen":"уұӨӣ",
"ko":"уұӨң","kokosila":"уұҰ„","kon":"уұӨқ","ku":"уұҰҲ",
"kule":"уұӨһ","kulupu":"уұӨҹ","kute":"уұӨ ",
"la":"уұӨЎ","lanpan":"уұҰ…","lape":"уұӨў","laso":"уұӨЈ",
"lawa":"уұӨӨ","leko":"уұҘј","len":"уұӨҘ","lete":"уұӨҰ",
"li":"уұӨ§","lili":"уұӨЁ","linja":"уұӨ©","lipu":"уұӨӘ",
"loje":"уұӨ«","lon":"уұӨ¬","luka":"уұӨӯ","lukin":"уұӨ®",
"lupa":"уұӨҜ","ma":"уұӨ°","majuna":"уұҰў","mama":"уұӨұ",
"mani":"уұӨІ","meli":"уұӨі","meso":"уұҰӮ","mi":"уұӨҙ",
"mije":"уұӨө","misikeke":"уұҰҮ","moku":"уұӨ¶","moli":"уұӨ·",
"monsi":"уұӨё","monsuta":"уұҘҪ","mu":"уұӨ№","mun":"уұӨә",
"musi":"уұӨ»","mute":"уұӨј","n":"уұҰҶ","namako":"уұҘё",
"nanpa":"уұӨҪ","nasa":"уұӨҫ","nasin":"уұӨҝ","nena":"уұҘҖ",
"ni":"уұҘҒ","nimi":"уұҘӮ","noka":"уұҘғ","o":"уұҘ„",
"oko":"уұҘә","olin":"уұҘ…","ona":"уұҘҶ","open":"уұҘҮ",
"pakala":"уұҘҲ","pake":"уұҰ ","pali":"уұҘү","palisa":"уұҘҠ",
"pan":"уұҘӢ","pana":"уұҘҢ","pi":"уұҘҚ","pilin":"уұҘҺ",
"pimeja":"уұҘҸ","pini":"уұҘҗ","pipi":"уұҘ‘","poka":"уұҘ’",
"poki":"уұҘ“","pona":"уұҘ”","powe":"уұҰЈ","pu":"уұҘ•",
"sama":"уұҘ–","seli":"уұҘ—","selo":"уұҘҳ","seme":"уұҘҷ",
"sewi":"уұҘҡ","sijelo":"уұҘӣ","sike":"уұҘң","sin":"уұҘқ",
"sina":"уұҘһ","sinpin":"уұҘҹ","sitelen":"уұҘ ","soko":"уұҰҒ",
"sona":"уұҘЎ","soweli":"уұҘў","suli":"уұҘЈ","suno":"уұҘӨ",
"supa":"уұҘҘ","suwi":"уұҘҰ","tan":"уұҘ§","taso":"уұҘЁ",
"tawa":"уұҘ©","telo":"уұҘӘ","ten":"уұҘ«","tenpo":"уұҘ«",
"toki":"уұҘ¬","tomo":"уұҘӯ","tonsi":"уұҘҫ","tu":"уұҘ®",
"unpa":"уұҘҜ","uta":"уұҘ°","utala":"уұҘұ","walo":"уұҘІ",
"wan":"уұҘі","waso":"уұҘҙ","wawa":"уұҘө","weka":"уұҘ¶",
"wile":"уұҘ·"
};

const symbolMap = {
    "[": "уұҰҗ",
    "]": "уұҰ‘",
    "'": "'",
    ",": "гҖҒ",
    ".": "уұҰң",
    ":": "пјҡ",
    ";": "пјӣ",
    "-": "пјҚ",
    "=": "пјқ"
};

function convert(text) {
    let result = "";
    const lines = text.split("\n");

    for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
        const line = lines[lineIndex];

        // Split into: words, whitespace, or punctuation/symbol runs
        const chunks = line.match(/[A-Za-z]+|\s+|[^A-Za-z\s]+/g) || [];

        for (const chunk of chunks) {
            // Spaces: skip single space, keep 2+ spaces as one visible space
            if (/^\s+$/.test(chunk)) {
                if (chunk.length >= 2) result += " ";
                continue;
            }

            // Normal word
            if (/^[A-Za-z]+$/.test(chunk)) {
                const lower = chunk.toLowerCase();
                if (tpDict[lower]) {
                    result += tpDict[lower];
                } else {
                    for (const ch of chunk) {
                        result += symbolMap[ch] || ch;
                    }
                }
                continue;
            }

            // Punctuation / symbols
            for (const ch of chunk) {
                result += symbolMap[ch] || ch;
            }
        }

        if (lineIndex < lines.length - 1) result += "\n";
    }

    return result;
}

function renderText() {
    preview.textContent = convert(input.value);
}

function exportText() {
    const blob = new Blob([preview.textContent], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "toki-pona.txt";
    link.click();
}

fileInput.addEventListener("change", function () {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        input.value = e.target.result;
        renderText();
    };
    reader.readAsText(file);
});

input.addEventListener("input", renderText);
</script>

</body>
</html>
